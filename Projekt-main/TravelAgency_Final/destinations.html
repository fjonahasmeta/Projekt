  <link rel="stylesheet" href="css/style.css">
  
  <style>
    .dest-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr); 
      grid-auto-rows: 400px;
      gap: 20px;
      padding: 0 4rem;
      margin-bottom: 5rem;
    }

    .dest-card {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000;
    }

    .dest-card img {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
      display: block;
    }

    @media (max-width: 1024px) {
      .dest-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 768px) {
      .dest-grid { grid-template-columns: 1fr; grid-auto-rows: 300px; padding: 0 2rem; }
    }
  </style>
</head>
