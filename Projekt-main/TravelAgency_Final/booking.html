<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <title>Booking – Balfin Escape</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav id="navbar" class="scrolled">
  <div class="nav-logo" onclick="location.href='index.html'">
    Balfin<span>Escape</span>
  </div>
</nav>

<section style="padding-top:150px;text-align:center;">

  <div class="section-label">✦ Booking</div>
  <h2 class="section-title">Rezervo <em>Udhëtimin</em></h2>

  <form id="bookingForm" style="max-width:500px;margin:auto;display:flex;flex-direction:column;gap:1rem;">

    <!-- EMRI -->
    <input id="bName" type="text" placeholder="Emri i plotë"
      style="padding:1rem;background:var(--panel);border:1px solid var(--border);color:white;">

    <!-- EMAIL -->
    <input id="bEmail" type="email" placeholder="Email"
      style="padding:1rem;background:var(--panel);border:1px solid var(--border);color:white;">

    <!-- DESTINACIONI (TANI POSHT) -->
    <select id="bDestination"
      style="padding:1rem;background:var(--panel);border:1px solid var(--border);color:white;">
      <option value="">Zgjidh destinacionin</option>
      <option value="Paris">Paris</option>
      <option value="Roma">Roma</option>
      <option value="Santorini">Santorini</option>
      <option value="Dubai">Dubai</option>
      <option value="Tokyo">Tokyo</option>
      <option value="Bali">Bali</option>
      <option value="New York">New York</option>
      <option value="Barcelona">Barcelona</option>
    </select>

    <!-- DATA -->
    <input id="bDate" type="date"
      style="padding:1rem;background:var(--panel);border:1px solid var(--border);color:white;">

    <!-- PERSONA (NUK LEJO NEGATIV) -->
    <input id="bPeople" type="number" min="1" placeholder="Numri i personave"
      style="padding:1rem;background:var(--panel);border:1px solid var(--border);color:white;">

    <button class="btn-primary" type="submit">Dërgo Rezervimin</button>

  </form>
</section>

<!-- POPUP -->
<div id="bookingPopup"
style="display:none;position:fixed;top:20px;right:20px;background:var(--gold);color:black;padding:1rem;border-radius:4px;">
Rezervimi u krye me sukses!
</div>

<script>
  // auto destination nga "Rezervo"
  window.addEventListener("DOMContentLoaded", function () {
    const saved = localStorage.getItem("selectedDestination");
    if (saved) {
      document.getElementById("bDestination").value = saved;
    }
  });

  const form = document.getElementById("bookingForm");
  const popup = document.getElementById("bookingPopup");

  form.addEventListener("submit", function(e) {
    e.preventDefault();

    const dest = document.getElementById("bDestination").value;
    const name = document.getElementById("bName").value;
    const email = document.getElementById("bEmail").value;
    const date = document.getElementById("bDate").value;
    const people = document.getElementById("bPeople").value;

    if (!dest || !name || !email || !date || !people) {
      alert("Plotëso të gjitha fushat!");
      return;
    }

    if (people < 1) {
      alert("Numri i personave nuk mund të jetë më i vogël se 1!");
      return;
    }

    popup.style.display = "block";

    setTimeout(() => {
      popup.style.display = "none";
      form.reset();
    }, 2500);
  });
</script>

</body>
</html>
