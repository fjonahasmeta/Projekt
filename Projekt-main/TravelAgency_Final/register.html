<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <title>Register – Balfin Escape</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav id="navbar" class="scrolled">
  <div class="nav-logo">Balfin<span>Escape</span></div>
</nav>

<section class="auth-page">

  <div class="auth-left">
    <h1>Balfin Escape</h1>
    <p>Udhëtime premium për eksperienca të paharrueshme</p>
  </div>

  <div class="auth-right">
    <h2>Krijo Account</h2>

    <form id="registerForm">

      <input id="rName" type="text" placeholder="Emri">
      <input id="rEmail" type="email" placeholder="Email">
      <input id="rPass" type="password" placeholder="Password">
      <input id="rConfirm" type="password" placeholder="Konfirmo Password">

      <button class="btn-primary" type="submit">Regjistrohu</button>

      <p class="switch">
        Ke account? <a href="login.html">Log In</a>
      </p>

    </form>
  </div>

</section>

<div id="registerPopup"
style="display:none;position:fixed;top:20px;right:20px;background:var(--gold);color:black;padding:1rem;">
Regjistrimi u krye me sukses!
</div>

<script src="js/script.js"></script>
</body>
</html>
