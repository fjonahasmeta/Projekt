<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <title>Login – Balfin Escape</title>
  <link rel="stylesheet" href="../Projekt-main/TravelAgency_Final/css/style.css">
</head>
<body>

<nav id="navbar" class="scrolled">
  <div class="nav-logo">Balfin<span>Escape</span></div>
</nav>

<section style="padding-top:150px;text-align:center;">
  <div class="section-label">✦ Login</div>
  <h2 class="section-title">Hyr në <em>Account</em></h2>

  <form id="loginForm" style="max-width:400px;margin:auto;display:flex;flex-direction:column;gap:1rem;">

    <input id="loginUser" type="text" placeholder="Username"
      style="padding:1rem;background:var(--panel);border:1px solid var(--border);color:white;">

    <input id="loginPass" type="password" placeholder="Password"
      style="padding:1rem;background:var(--panel);border:1px solid var(--border);color:white;">

    <button class="btn-primary" type="submit">Login</button>
  </form>
</section>

<div id="loginPopup"
style="display:none;position:fixed;top:20px;right:20px;background:var(--gold);color:black;padding:1rem;">
Login i suksesshëm!
</div>

<script src="../Projekt-main/TravelAgency_Final/js/script.js"></script>
</body>
</html>
