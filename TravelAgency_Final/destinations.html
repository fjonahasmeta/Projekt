<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Destinacionet – Balfin Escape</title>
  <link rel="stylesheet" href="css/style.css">

  <style>
    .dest-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 25px;
      padding: 0 4rem;
    }

    .dest-card {
      position: relative;
      height: 420px;
      overflow: hidden;
      border-radius: 10px;
      cursor: pointer;
    }

    .dest-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: 0.5s;
    }

    .dest-card:hover img {
      transform: scale(1.1);
    }

    .dest-overlay {
      position: absolute;
      bottom: 0;
      width: 100%;
      padding: 20px;
      color: white;
      background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
    }

    .dest-city {
      font-size: 1.5rem;
      font-weight: bold;
    }

    .dest-desc {
      font-size: 0.9rem;
      margin: 8px 0;
      opacity: 0.9;
    }

    .dest-price {
      font-weight: bold;
      color: gold;
    }

    .dest-btn {
      margin-top: 10px;
      padding: 8px 15px;
      background: gold;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<section style="padding-top:120px;text-align:center;">
  <h2>Destinacionet Tona</h2>
</section>
<div class="dest-grid">

  <!-- PARIS -->
  <div class="dest-card">
    <img src="https://images.unsplash.com/photo-1499856871958-5b9627545d1a">
    <div class="dest-overlay">
      <div class="dest-city">Paris</div>
      <div class="dest-desc">Qyteti i dashurisë dhe artit.</div>
      <div class="dest-price">Nga €799</div>
      <button class="dest-btn" onclick="bookDestination('Paris')">Book Now</button>
    </div>
  </div>

  <!-- ROME -->
  <div class="dest-card">
    <img src="https://images.unsplash.com/photo-1515542622106-78bda8ba0e5b">
    <div class="dest-overlay">
      <div class="dest-city">Roma</div>
      <div class="dest-desc">Histori dhe kulturë e lashtë.</div>
      <div class="dest-price">Nga €650</div>
      <button class="dest-btn" onclick="bookDestination('Roma')">Book Now</button>
    </div>
  </div>

  <!-- TOKYO -->
  <div class="dest-card">
    <img src="https://images.unsplash.com/photo-1540959733332-eab4deabeeaf">
    <div class="dest-overlay">
      <div class="dest-city">Tokyo</div>
      <div class="dest-desc">Teknologji dhe traditë.</div>
      <div class="dest-price">Nga €1200</div>
      <button class="dest-btn" onclick="bookDestination('Tokyo')">Book Now</button>
    </div>
  </div>

  <!-- SANTORINI -->
  <div class="dest-card">
    <img src="https://images.unsplash.com/photo-1513407030348-c983a97b98d8">
    <div class="dest-overlay">
      <div class="dest-city">Santorini</div>
      <div class="dest-desc">Ishull romantik me pamje magjike.</div>
      <div class="dest-price">Nga €900</div>
      <button class="dest-btn" onclick="bookDestination('Santorini')">Book Now</button>
    </div>
  </div>

  <!-- DUBAI -->
  <div class="dest-card">
    <img src="https://images.unsplash.com/photo-1518684079-3c830dcef090">
    <div class="dest-overlay">
      <div class="dest-city">Dubai</div>
      <div class="dest-desc">Luks dhe eksperienca unike.</div>
      <div class="dest-price">Nga €1100</div>
      <button class="dest-btn" onclick="bookDestination('Dubai')">Book Now</button>
    </div>
  </div>

  <!-- BALI -->
  <div class="dest-card">
    <img src="https://images.unsplash.com/photo-1537996194471-e657df975ab4">
    <div class="dest-overlay">
      <div class="dest-city">Bali</div>
      <div class="dest-desc">Parajsë tropikale relaksuese.</div>
      <div class="dest-price">Nga €1050</div>
      <button class="dest-btn" onclick="bookDestination('Bali')">Book Now</button>
    </div>
  </div>

</div>

<script>
function bookDestination(dest) {
  localStorage.setItem("selectedDestination", dest);
  window.location.href = "booking.html";
}
</script>

</body>
</html>
